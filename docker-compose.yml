version: "3.9"

services:

  # ── Python market data service ─────────────────────────────────────────────
  python-service:
    build:
      context: ./python-service
    container_name: signal-python
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GEMINI_RETRY_DELAY=${GEMINI_RETRY_DELAY:-4}
      - MOCK_MODE=${MOCK_MODE:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Java Spring Boot service ───────────────────────────────────────────────
  java-service:
    build:
      context: ./java-service
    container_name: signal-java
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MARKET_DATA_SERVICE_URL=http://python-service:5000
      # SQLite DB stored in a volume so data persists across restarts
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/data/signal_engine.db
    volumes:
      - signal-db:/data
    depends_on:
      python-service:
        condition: service_healthy

  # ── Trade tracker UI (nginx serves the HTML) ───────────────────────────────
  ui:
    image: nginx:alpine
    container_name: signal-ui
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./trade_tracker.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  signal-db:
    driver: local
