server {
    listen 80;
    server_name _;

    # Serve the trade tracker HTML
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to Java Spring Boot
    location /api/ {
        proxy_pass         http://signal-java:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # long timeout for pipeline runs
    }

    # Proxy /python/* to Python Flask (for direct access if needed)
    location /python/ {
        rewrite            ^/python/(.*) /$1 break;
        proxy_pass         http://signal-python:5000;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/json application/javascript;
}
