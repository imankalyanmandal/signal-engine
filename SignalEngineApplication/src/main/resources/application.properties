spring.application.name=SignalEngineApplication

# \u2500\u2500 Market data service \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
market.data.service.url=http://localhost:5000

# \u2500\u2500 Backtest engine parameters \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# All values can be changed here without recompiling

# Starting capital in INR
backtest.initial.capital=100000

# Fraction of capital risked per trade (0.02 = 2%)
backtest.risk.per.trade=0.02

# ATR multiplier for dynamic stop-loss
# stop = entry - (multiplier * ATR)
# Higher = wider stop, fewer whipsaws but larger losses when stopped
backtest.atr.multiplier=2.0

# ATR calculation period
backtest.atr.period=14

# Risk-reward ratio for take-profit
# target = entry + (stop_distance * RR)
# 2.0 means target is 2x the stop distance
backtest.take.profit.rr=2.0

# Commission per trade (0.001 = 0.1%)
backtest.commission.rate=0.001

# Slippage on entry and exit
backtest.entry.slippage=0.0025
backtest.exit.slippage=0.0025

# Bars to wait after a stop-loss before re-entering
backtest.cooldown.bars=5

# Max consecutive losses before pausing
backtest.max.consecutive.losses=2

# \u2500\u2500 Logging \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
logging.level.signal_engine=INFO
# Change to DEBUG to see every trade entry/exit in logs
# logging.level.signal_engine=DEBUG

