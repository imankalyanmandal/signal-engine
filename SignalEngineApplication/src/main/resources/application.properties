# SQLite database — single file, no server needed
# ── Add these lines to your existing application.properties ───────────────────

# \u2500\u2500 Add these lines to your existing application.properties \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
# ── Add these lines to your existing application.properties ───────────────────

# SQLite database — single file, no server needed
spring.datasource.url=jdbc:sqlite:trades.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Enable @Scheduled (price refresh job)
spring.task.scheduling.enabled=true

# Allow CORS from the tracker UI served on any port
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PATCH,DELETE,OPTIONS

# ── Live scan thresholds (all tunable without recompiling) ────────────────────
live.scan.data.period=3mo

# ── Hard gates (fail = stock blocked entirely) ────────────────────────────────
live.scan.rsi.max=68
live.scan.rsi.min=20
live.scan.volume.min.gate=0.8
live.scan.stop.max.pct=8.0

# Gate 6 — SMA50 slope: how many bars to look back to measure slope direction
live.scan.sma50.slope.bars=10

# Gate 7 — Relative strength: lookback bars (stock return vs Nifty return)
live.scan.rs.lookback.bars=20

# Gate 8 — Price structure: lookback bars for higher high / higher low detection
live.scan.structure.lookback.bars=20

# Gate 9 — Momentum: lookback bars and minimum green candles required
live.scan.momentum.bars=10
live.scan.momentum.min.green=5

# Warn A — Near resistance: warn if stock is within this % of 52-week high
live.scan.resistance.pct=8.0

# ── Scoring thresholds ────────────────────────────────────────────────────────
live.scan.rsi.sweet.low=30
live.scan.rsi.sweet.high=45
live.scan.volume.strong=1.5
live.scan.volume.ok=1.2
live.scan.atr.multiplier=2.0
live.scan.rr.ratio=2.0
live.scan.setup.min.score=40

# ── Layer 3 — S/R refinement ───────────────────────────────────────────────────
layer3.data.period=6mo
layer3.pivot.bars=3
layer3.sr.lookback=60
layer3.cluster.tolerance=0.015
layer3.stop.atr.multiplier=2.0
layer3.stop.buffer.atr=0.5
layer3.stop.max.pct=7.0
layer3.stop.min.atr=1.0
layer3.target.atr.multiplier=4.0
layer3.min.rr.ratio=1.5